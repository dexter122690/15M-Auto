<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>15M Autocare</title>
  <style>body{font-family:Arial,sans-serif;background:#111;color:#fff;display:grid;place-items:center;min-height:100vh;margin:0}p{color:#ff6a2b}</style>
</head>
<body>
  <main><h1>15M Autocare</h1><p>Loading dashboard...</p></main>
  <script>
    try {
      const reportKey = '15m-owner-report';
      const branchKey = '15m-branch-store';
      const report = JSON.parse(localStorage.getItem(reportKey) || 'null');
      if (report && report.__15mMultiBranch && report.branchData) {
        const selected = report.selectedBranchId && report.selectedBranchId !== 'all'
          ? report.selectedBranchId
          : 'sta-rosa';
        localStorage.setItem(branchKey, JSON.stringify(report));
        localStorage.setItem(reportKey, JSON.stringify(report.branchData[selected] || {}));
      }
    } catch (_) {}

    (async () => {
      try {
        const files = ['part-001.txt', 'part-002.txt', 'part-003.txt', 'part-004.txt'];
        const encoded = (await Promise.all(files.map(file => fetch(file).then(response => {
          if (!response.ok) throw new Error(file);
          return response.text();
        })))).join('');
        const bytes = Uint8Array.from(atob(encoded), character => character.charCodeAt(0));
        const html = await new Response(new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'))).text();

        // Sto. Tomas starts blank. Sta. Rosa keeps its historical records while cloud data loads.
        const signedInBranch = String(localStorage.getItem('15m-local-branch-login') || '').toLowerCase();
        const skipImports = signedInBranch === '15msto.tomas@gmail.com'
          ? '<script>window.__15mSkipStaRosaImports=true;</' + 'script>'
          : '';
        const cloudScripts = '<script src="supabase-sync.js?v=branch-data-16"></' + 'script>' +
          '<script src="expense-actions.js?v=2"></' + 'script>';
        document.open();
        document.write(html.replace('<body>', '<body>' + skipImports).replace('</body>', cloudScripts + '</body>'));
        document.close();
      } catch (error) {
        document.body.innerHTML = '<main><h1>15M Autocare</h1><p>Dashboard files are still loading. Please refresh in a moment.</p></main>';
        console.error(error);
      }
    })();
  </script>
</body>
</html>
