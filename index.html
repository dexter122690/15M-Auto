<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>15M Autocare</title><style>body{font-family:Arial,sans-serif;background:#111;color:#fff;display:grid;place-items:center;min-height:100vh;margin:0}p{color:#ff6a2b}</style></head><body><main><h1>15M Autocare</h1><p>Loading dashboard...</p></main><script>try{const k='15m-owner-report',b='15m-branch-store',v=JSON.parse(localStorage.getItem(k)||'null');if(v&&v.__15mMultiBranch&&v.branchData){const s=v.selectedBranchId&&v.selectedBranchId!=='all'?v.selectedBranchId:'sta-rosa';localStorage.setItem(b,JSON.stringify(v));localStorage.setItem(k,JSON.stringify(v.branchData[s]||{}));}}catch(_){};(async()=>{try{const files=['part-001.txt','part-002.txt','part-003.txt','part-004.txt'];const encoded=(await Promise.all(files.map(file=>fetch(file).then(response=>{if(!response.ok)throw new Error(file);return response.text()})))).join('');const bytes=Uint8Array.from(atob(encoded),character=>character.charCodeAt(0));const html=await new Response(new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'))).text();const cloud='<script src="supabase-sync.js?v=signin-design-1"></'+'script>';document.open();document.write(html.replace('</body>',cloud+'</body>'));document.close()}catch(error){document.body.innerHTML='<main><h1>15M Autocare</h1><p>Dashboard files are still loading. Please refresh in a moment.</p></main>';console.error(error)}})();</script></body></html>
